name: Keep Streamlit Awake
on:
  schedule:
    - cron: "0 */6 * * *"  # A cada 6 horas
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Keep alive
        run: |
          # Usa um arquivo rastreado (keep_alive.txt) — NÃO um *.log,
          # que é ignorado pelo .gitignore e fazia o "git add" falhar.
          # Sobrescreve com o timestamp atual para manter o diff mínimo.
          date -u +"Last keep-alive ping: %Y-%m-%dT%H:%M:%SZ" > keep_alive.txt
          git add keep_alive.txt
          if git diff --cached --quiet; then
            echo "Nada para commitar; nenhuma mudança neste ciclo."
            exit 0
          fi
          git commit -m "chore: keep Streamlit awake"
          git push

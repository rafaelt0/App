<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 72" width="300" height="72">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&amp;display=swap');</style>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff87"/>
      <stop offset="100%" stop-color="#00d2ff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Flask icon -->
  <g transform="translate(8, 4)" filter="url(#glow)">
    <rect x="18" y="0" width="20" height="5" rx="2.5" fill="url(#brand-grad)"/>
    <path d="M18 5 L18 24 L6 46 Q3 52 10 52 L46 52 Q53 52 50 46 L38 24 L38 5 Z"
          fill="rgba(0,255,135,0.05)"
          stroke="url(#brand-grad)"
          stroke-width="2"
          stroke-linejoin="round"/>
    <path d="M12 50 Q10 52 10 52 L46 52 Q53 52 50 46 L38 34 L18 34 Z"
          fill="rgba(0,255,135,0.08)"/>
    <!-- Candle 1 bull -->
    <line x1="20" y1="30" x2="20" y2="50" stroke="#00ff87" stroke-width="1" opacity="0.6"/>
    <rect x="17" y="36" width="6" height="10" rx="1" fill="#00ff87"/>
    <!-- Candle 2 bear -->
    <line x1="28" y1="28" x2="28" y2="50" stroke="#ff3d5a" stroke-width="1" opacity="0.6"/>
    <rect x="25" y="30" width="6" height="14" rx="1" fill="#ff3d5a"/>
    <!-- Candle 3 bull -->
    <line x1="36" y1="32" x2="36" y2="50" stroke="#00ff87" stroke-width="1" opacity="0.6"/>
    <rect x="33" y="38" width="6" height="8" rx="1" fill="#00ff87"/>
  </g>

  <!-- Wordmark -->
  <text x="82" y="38"
        font-family="Space Grotesk, system-ui, sans-serif"
        font-weight="700"
        font-size="32"
        letter-spacing="-0.03em">
    <tspan fill="url(#brand-grad)">B3</tspan><tspan fill="#f8fafc">Lab</tspan>
  </text>

  <!-- Tagline -->
  <text x="83" y="56"
        font-family="Space Grotesk, system-ui, sans-serif"
        font-weight="400"
        font-size="10"
        fill="#64748b"
        letter-spacing="0.12em">
    ANÁLISE QUANTITATIVA · B3
  </text>
</svg>
